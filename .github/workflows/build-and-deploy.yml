name: Meta Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.95.2 pydantic==1.10.13 uvicorn==0.23.2

      - run: |
          echo "PWD:"
          pwd
          ls -la
          ls -la meta_ui

      - run: |
          PYTHONPATH=$PWD python -m uvicorn meta_ui.api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl --fail http://127.0.0.1:8000/health

      - run: python phase1_promote.py
