name: Meta Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------
      # P6 VALIDATION (DETERMINISTIC)
      # ------------------------------

      - name: Validate import
        run: |
          python -c "import meta_ui.api"

      - name: Validate app boot
        run: |
          python - <<EOF
from meta_ui.api import app
print("APP_IMPORT_OK")
EOF

      - name: Validate /health endpoint
        run: |
          python - <<EOF
from fastapi.testclient import TestClient
from meta_ui.api import app

client = TestClient(app)
r = client.get("/health")

assert r.status_code == 200, f"Status not 200: {r.status_code}"
assert isinstance(r.json(), dict), "Response not JSON"

print("HEALTH_OK", r.json())
EOF

  deploy:
    needs: build-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Deployment marker
        run: echo "Validation passed — ready for Render deploy"
