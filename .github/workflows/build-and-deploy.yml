name: Meta Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout MDL
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.95.2 pydantic==1.10.13 uvicorn==0.23.2

      - name: Verify repo root and structure
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "META_UI CONTENT:"
          ls -la meta_ui || echo "meta_ui missing"

      - name: Test Python import directly
        run: |
          python - <<EOF
import sys, os
print("CWD:", os.getcwd())
print("PATH:", sys.path)
import meta_ui.api
print("IMPORT SUCCESS")
EOF

      - name: Start API and probe /health
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=$GITHUB_WORKSPACE python -m uvicorn meta_ui.api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl --fail http://127.0.0.1:8000/health

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Phase 1 Promotion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python phase1_promote.py
