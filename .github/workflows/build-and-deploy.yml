name: Meta Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------
      # LOOP-STOP FIX: direct file load
      # ------------------------------

      - name: Load app directly from file
        run: |
          python - <<EOF
import importlib.util
import sys

spec = importlib.util.spec_from_file_location("api", "meta_ui/api.py")
module = importlib.util.module_from_spec(spec)
sys.modules["api"] = module
spec.loader.exec_module(module)

app = module.app
print("APP_LOADED")
EOF

      - name: Validate /health endpoint
        run: |
          python - <<EOF
import importlib.util
import sys
from fastapi.testclient import TestClient

spec = importlib.util.spec_from_file_location("api", "meta_ui/api.py")
module = importlib.util.module_from_spec(spec)
sys.modules["api"] = module
spec.loader.exec_module(module)

app = module.app

client = TestClient(app)
r = client.get("/health")

assert r.status_code == 200, f"Status not 200: {r.status_code}"
assert isinstance(r.json(), dict), "Response not JSON"

print("HEALTH_OK", r.json())
EOF

  deploy:
    needs: build-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Deployment marker
        run: echo "Validation passed — ready for Render deploy"
