name: Bootstrap MBH

on:
  push:
    branches:
      - main

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug file
        run: |
          echo "===== CURRENT bootstrap.py ====="
          cat engine/bootstrap.py
          echo "================================"

      - name: Install deps
        run: pip install requests

      - name: Run bootstrap
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python engine/bootstrap.py

      - name: Commit generated files
        run: |
          git config user.name "mbh-bot"
          git config user.email "bot@mbh.ai"
          git add .
          git commit -m "MBH: generated system" || echo "No changes"
          git push
