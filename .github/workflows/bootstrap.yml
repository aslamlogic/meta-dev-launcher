name: Meta Build System

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn

      - name: Inspect and run controller
        run: |
          echo "=== WORKING DIRECTORY ==="
          pwd

          echo "=== FILE STRUCTURE ==="
          ls -R

          echo "=== CONTROLLER FILE ==="
          cat iteration/controller.py

          echo "=== SPEC FILE ==="
          cat specs/init.json || true

          echo "=== SET PYTHONPATH ==="
          export PYTHONPATH=$PYTHONPATH:$(pwd)

          echo "=== RUN CONTROLLER ==="
          python -u iteration/controller.py
