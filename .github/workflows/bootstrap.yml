name: Bootstrap MBH

on:
  push:
    branches:
      - main

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: DEBUG FILE CONTENT
        run: |
          echo "===== CURRENT bootstrap.py ====="
          cat engine/bootstrap.py
          echo "================================"

      - name: Install deps
        run: pip install requests

      - name: Run bootstrap
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python engine/bootstrap.py
